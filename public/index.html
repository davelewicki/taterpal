<!DOCTYPE html>
<html lang="en">

<head>
    <script>
        // Set dynamic base path for routing and assets
        const baseHref = window.location.pathname.includes('/taterpal/') ? '/taterpal/' : '/';
        const baseTag = document.createElement('base');
        baseTag.href = baseHref;
        document.head.appendChild(baseTag);
    </script>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>
        TaterPal
    </title>

    <!-- https://realfavicongenerator.net/ is bloody amazing as always  -->
    <link rel="apple-touch-icon" sizes="180x180" href="<%= BASE_URL %>img/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="<%= BASE_URL %>img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="<%= BASE_URL %>img/favicon-16x16.png">
    <link rel="manifest" href="<%= BASE_URL %>site.webmanifest">
    <link rel="mask-icon" href="<%= BASE_URL %>img/safari-pinned-tab.svg" color="#055581">
    <link rel="shortcut icon" href="<%= BASE_URL %>img/favicon.ico">
    <meta name="apple-mobile-web-app-title" content="TaterPal">
    <meta name="application-name" content="TaterPal">
    <meta name="msapplication-TileColor" content="#2b5797">
    <meta name="msapplication-config" content="<%= BASE_URL %>img/browserconfig.xml">
    <meta name="theme-color" content="#ffffff">

    <script src="https://donorbox.org/widget.js" paypalExpress="false"></script>

    <!-- <script>
        // Classic iOS being impossible to debug
        window.onerror = function (message, filename, lineno, colno, error) {
            alert(message + " in " + filename + ":" + lineno + "." + colno + ", " + error);
        };
    </script> -->
</head>

<body>
    <noscript>
        <strong>We're sorry but TaterPal doesn't work properly without JavaScript enabled.
            Please enable it to continue.</strong>
    </noscript>
    <div id="app"></div>
    <!-- built files will be auto injected -->
</body>

</html>
